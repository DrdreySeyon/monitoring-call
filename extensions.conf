; extensions.conf - the Asterisk dial plan
;
; Static extension configuration file, used by
; the pbx_config module. This is where you configure all your
; inbound and outbound calls in Asterisk.
;
; This configuration file is reloaded
; - With the "dialplan reload" command in the CLI
; - With the "reload" command (that reloads everything) in the CLI

;
; The "General" category is for certain variables.
;
[general]

static=yes

writeprotect=no

clearglobalvars=no


[conference]
; Gérer les appels vers la conférence
exten => 700,1,NoOp(Rejoindre la conférence)
same => n,Answer()                      ; Répondre à l'appel
same => n,ConfBridge(700)               ; Rejoindre la conférence 700
same => n,Playback(hello-world)       ; Jouer le message de guide
same => n,Hangup()                       ; Terminer l'appel

[add1header]
exten => addheader,1,Set(REDIRECTING(from-num,i)=)
exten => addheader,n,Set(REDIRECTING(count,i)=0)
exten => addheader,n,Set(REDIRECTING(from-num-valid,i)=0)
; Ajout de nouveaux entetes
exten => addheader,n,Set(PJSIP_HEADER(add,${ARG1})=${ARG2})
; Etat des entetes ajoutés
exten => addheader,n,Log(NOTICE, Info Entete '${ARG1}' envoyé = ${PJSIP_HEADER(read,${ARG1})})
exten => addheader,n,Return()


; Appels d'urgence
[exten-urgence]
exten => _1[578],1,NoOp(Appel vers n° d'urgence ${EXTEN})
same => n,Set(CALLED_NUM=${EXTEN})
same => n,Goto(urgence,${CALLED_NUM},1)

exten => _11[2569],1,NoOp(Appel vers n° d'urgence ${EXTEN})
same => n,Set(CALLED_NUM=${EXTEN})
same => n,Goto(urgence,${CALLED_NUM},1)

[urgence]
exten => _1.,1,NoOp(Appel sortant formaté vers ${CALLED_NUM})
same => n,Set(DROITS_USER=${ODBC_DROITS_APPEL(${CALLERID(num)})})
same => n,Set(ADDR_SRC=${CHANNEL(pjsip,remote_addr)})
same => n,Set(ADDR_SRC=${CUT(ADDR_SRC,:,1)})
same => n,Set(ADDR_SRC_SUBNET=${CUT(ADDR_SRC,.,1-3)})
same => n,Set(RECHERCHE_NDI=${ODBC_URGENCES(NDI,${ADDR_SRC_SUBNET})})
same => n,Gosub(choixOperateur,n,1)
same => n,GotoIf($["${RECHERCHE_NDI}" != ""]?sonnerNDI:erreurNDI)
same => n,NoOp(Addresse IP : ${ADDR_SRC})
same => n,NoOp(Subnet : ${ADDR_SRC_SUBNET})

same => n(sonnerNDI),NoOp(Le numéro NDI ${RECHERCHE_NDI} a été trouvé pour le subnet ${ADDR_SRC_SUBNET}.0/24, appel vers ce numéro)
same => n,Set(CALLERID(num)=+${RECHERCHE_NDI})
same => n,Goto(vers-trunk,${CALLED_NUM},1)
same => n,Hangup()

same => n(erreurNDI),NoOp(Le numéro NDI n'a pas été trouvé pour le subnet ${ADDR_SRC_SUBNET}.0/24, appel en présentant le n° initial, qui ne permettra pas à l'opérateur de localiser géographiquement l'appel)
same => n,Goto(vers-trunk,${CALLED_NUM},1)
same => n,Hangup()

[exten-SST]
exten => 505,1,NoOp(Appel vers n° SST ${EXTEN})
same => n,Set(DROITS_USER=${ODBC_DROITS_APPEL(${CALLERID(num)})})
same => n,Set(ADDR_SRC=${CHANNEL(pjsip,remote_addr)})
same => n,Set(ADDR_SRC=${CUT(ADDR_SRC,:,1)})
same => n,Set(ADDR_SRC_SUBNET=${CUT(ADDR_SRC,.,1-3)})
same => n,Set(RECHERCHE_SST=${ODBC_URGENCES(SST,${ADDR_SRC_SUBNET})})
same => n,Gosub(choixOperateur,n,1)
same => n,GotoIf($["${RECHERCHE_SST}" != ""]?sonnerSST:erreurSST)

same => n(sonnerSST),NoOp(Le numéro SST ${RECHERCHE_SST} a été trouvé pour le subnet ${ADDR_SRC_SUBNET}.0/24, appel vers ce numéro)
same => n,Set(CALLED_NUM=${RECHERCHE_SST})
same => n,Goto(vers-trunk,${CALLED_NUM},1)
same => n,Hangup()

same => n(erreurSST),NoOp(Le numéro SST n'a pas été trouvé pour le subnet ${ADDR_SRC_SUBNET}.0/24)
same => n,Playback(error-number)


[choixOperateur]
exten => n,1,NoOp(Sélection de l'opérateur de sortie)
same => n,Set(TRUNKVAR=TRUNK_SBC_SFR_VEGA); Route de sortie par défaut si aucune des conditions suivantes n'a été trouvée
same => n,ExecIf($["${DROITS_USER}" =~ "SFR"]?MSet(TRUNKVAR=TRUNK_SBC_SFR_VEGA,DROITS_USER=${STRREPLACE(DROITS_USER,_SFR,)}))
same => n,ExecIf($["${DROITS_USER}" =~ "OBSHDF"]?MSet(TRUNKVAR=TRUNK_SBC_OBSHDF_VEGA,DROITS_USER=${STRREPLACE(DROITS_USER,_OBSHDF,)}))
same => n,ExecIf($["${DROITS_USER}" =~ "OBS"]?MSet(TRUNKVAR=TRUNK_SBC_OBS_VEGA,DROITS_USER=${STRREPLACE(DROITS_USER,_OBS,)}))
same => n,ExecIf($["${DROITS_USER}" =~ "ODIGO"]?MSet(TRUNKVAR=TRUNK_SBC_ODIGO_VEGA,DROITS_USER=${STRREPLACE(DROITS_USER,_ODIGO,)}))
same => n,NoOp(Trunk sélectionné : ${TRUNKVAR})
same => n,Return()

;## Appel sortant (venant de CUCM / OXE, vers un trunk SBC)

[choixOperateur2]
exten => n,1,NoOp(Sélection de l'opérateur de sortie)
same => n,Set(TRUNKS_GROUP=PJSIP/TRUNK_SBC_SFR_VEGA&PJSIP/TRUNK_SBC_SFR_SIRIUS); Route de sortie par défaut si aucune des conditions suivantes n'a été trouvée
same => n,ExecIf($["${GUIDE_OPER}" =~ "SFR"]?Set(TRUNKS_GROUP=PJSIP/TRUNK_SBC_SFR_VEGA&PJSIP/TRUNK_SBC_SFR_SIRIUS))
same => n,ExecIf($["${GUIDE_OPER}" =~ "ODIGO"]?Set(TRUNKS_GROUP=PJSIP/TRUNK_SBC_ODIGO_VEGA&PJSIP/TRUNK_SBC_ODIGO_SIRIUS))
same => n,ExecIf($["${GUIDE_OPER}" =~ "OBS"]?Set(TRUNKS_GROUP=PJSIP/TRUNK_SBC_OBS_VEGA&PJSIP/TRUNK_SBC_OBS_SIRIUS))
same => n,NoOp(Trunk sélectionné : ${TRUNKS_GROUP})
same => n,ChanIsAvail(${TRUNKS_GROUP});Vérification des trunks disponibles
same => n,ExecIf($["${AVAILORIGCHAN}" != ""]?Set(AVAIL_TRUNK=${AVAILORIGCHAN:6}))
same => n,Return()


[startannounce]
exten => s,1,NoOp(Execution d'un script AMI pour jouer le guide audio sur l'appelant / appelé)
same => n,Set(CALLERCHAN=${CHANNEL}); Récupération du canal appelant
same => n,Set(PEERCHAN=${BRIDGEPEER}); Récupération du canal appelé
same => n,System(/srv/asterisk/scripts/announce.sh ${CALLERCHAN} ${PEERCHAN} ${GUIDE_FILE} ${GUIDE_FILE_CALLER})
same => n,Return()

[whisper-to-party]
exten => s,1,NoOp(Execution depuis script AMI "announce")
same => n,Answer()
same => n,NoOp(Diffusion du guide sur ${MyChannel})
same => n,ChanSpy(${MyChannel},qsW)


[from-cucm]
exten => _0.,1,NoOp(Appel sortant avec prédécroché)
same => n,Set(CALLER=${CALLERID(num):3});Suppression du préfixe opérateur
same => n,NoOp(Numéro appelant : ${CALLERID(num)} => ${CALLER})
same => n,Goto(check_guide,${EXTEN},1)

[from-oxe]
exten => _0.,1,NoOp(Appel sortant avec prédécroché)
same => n,Set(CALLER=${CALLERID(num):3});Suppression du préfixe opérateur
same => n,NoOp(Numéro appelant : ${CALLERID(num)} => ${CALLER})
same => n,Goto(check_guide,${EXTEN},1)

[check_guide]
exten => _0.,1,NoOp(Vérification de la présence d'un guide)
same => n,Set(CALLERID(num)=${CALLER}); Numéro qui sera présenté, sans le préfixe opérateur
; Vérification si n° appelant est bien présent dans le fichier guide.csv
same => n,Set(__GUIDE_LINE=${SHELL(grep "${CALLER}:" /srv/asterisk/etc/asterisk/guide.csv | head -n 1)})
same => n,Set(TRUNKS_GROUP=PJSIP/TRUNK_SBC_SFR_VEGA&PJSIP/TRUNK_SBC_SFR_SIRIUS); Trunk par défaut si aucun n'a été trouvé

; Si rien n'est trouvé, GUIDE_LINE sera vide
same => n,GotoIf($["${GUIDE_LINE}" = ""]?no_guide:has_guide)

; --- Cas où on a trouvé une ligne ---
same => n(has_guide),NoOp(Ligne GUIDE trouvée : ${GUIDE_LINE})

; On découpe les colonnes du CSV dans 5 variables
same => n,Set(__GUIDE_NUM=${CUT(GUIDE_LINE,:,1)})
same => n,Set(__GUIDE_NUMPRES=${CUT(GUIDE_LINE,:,2)})
same => n,Set(__GUIDE_ETAB=${CUT(GUIDE_LINE,:,3)})
same => n,Set(__GUIDE_OPER=${CUT(GUIDE_LINE,:,4)})
same => n,Set(__GUIDE_FILE=${CUT(GUIDE_LINE,:,5)})
same => n,Set(__GUIDE_MODE=${CUT(GUIDE_LINE,:,6)})

same => n,Set(__GUIDE_FILE_CALLER=${GUIDE_FILE})

; Si un numéro présenté a été trouvé, on l'utilise comme numéro apppelant
same => n,ExecIf($["${GUIDE_NUMPRES}" != ""]?Set(CALLERID(num)=${GUIDE_NUMPRES}))

; Vérifiacation de l'existance du fichier audio à jouer
same => n,Set(exists=${STAT(e,${ASTDATADIR}/sounds/custom/${GUIDE_FILE}.alaw)})
; Un message d'erreur sera joué à l'appelant si le guide le fichier n'a pas été trouvé et rien ne sera joué à l'appelé
same => n,ExecIf($["${exists}" = "0"]?MSet(__GUIDE_FILE_CALLER=predec_error,GUIDE_FILE=)

same => n,Gosub(choixOperateur2,n,1)

same => n,Goto(guide_mode)

; --- Cas où aucune ligne n'est trouvée ---
same => n(no_guide),NoOp(Aucun GUIDE trouvé pour appelant ${CALLER})
same => n,Gosub(choixOperateur2,n,1)
; Lecture d'un message d'erreur à l'appelant
same => n,Set(__GUIDE_FILE_CALLER=predec_error)
same => n,Dial(PJSIP/${EXTEN}@${AVAIL_TRUNK},,A(:${GUIDE_FILE_CALLER}))
; --- Suite du traitement normal ---
same => n(guide_mode),NoOp(Etape suivante du dialplan...${GUIDE_MODE})
same => n,GotoIf($["${GUIDE_MODE}" =~ "auto"]?guide_auto:guide_dtmf)
same => n(guide_dtmf),NoOp(Appel classique avec possibilité de déclencher guide via DTMF)
same => n,Set(__DYNAMIC_FEATURES=announce)
same => n,Dial(PJSIP/${EXTEN}@${AVAIL_TRUNK})
same => n(guide_auto),NoOp(Appel avec guide joué pour les 2 parties lorsque l'appelé décroche)
same => n,Dial(PJSIP/${EXTEN}@${AVAIL_TRUNK},,A(${GUIDE_FILE}:${GUIDE_FILE_CALLER}))


;## Appel entrant (venant d'un trunk SBC vers CUCM / OXE)


[check_guide_entrant]
exten => _+.,1,Set(FORMAT_EXTEN=0${EXTEN:3})
same => n,Set(GUIDE_LINE=${SHELL(grep "^${FORMAT_EXTEN}:" /srv/asterisk/etc/asterisk/guide.csv | head -n 1)})

; Si rien n'est trouvé, GUIDE_LINE sera vide
same => n,GotoIf($["${GUIDE_LINE}" = ""]?no_guide:has_guide)

 ; --- Cas où on a trouvé une ligne ---
same => n(has_guide),NoOp(Ligne GUIDE trouvée : ${GUIDE_LINE})

; On découpe les colonnes du CSV dans 5 variables
same => n,Set(GUIDE_NUM=${CUT(GUIDE_LINE,:,1)})
same => n,Set(GUIDE_ETAB=${CUT(GUIDE_LINE,:,3)})
same => n,Set(GUIDE_FILE=${CUT(GUIDE_LINE,:,5)})
same => n,Set(GUIDE_MODE=${CUT(GUIDE_LINE,:,6)})

; Recherche des trunks à solliciter en fonction de l'établissement appelé
same => n,ExecIf($["${GUIDE_ETAB}" != "" & ("${GUIDE_ETAB}" = "CECAZ" | "${GUIDE_ETAB}" = "CEPAC")]?MSet(TRUNKS_GROUP=PJSIP/TRUNK_CUCM_SUB1Q&PJSIP/TRUNK_CUCM_SUB2Q,FORMAT_EXTEN=00${EXTEN:3},CALLERID(num)=0${CALLERID(num):3}))

same => n,ExecIf($["${GUIDE_ETAB}" != "" & ("${GUIDE_ETAB}" = "CERA" | "${GUIDE_ETAB}" = "CELC")]?MSet(TRUNKS_GROUP=PJSIP/TRUNK_OXEQ_MAIN,FORMAT_EXTEN=${EXTEN:3},CALLERID(num)=0${CALLERID(num):3}))

same => n,Goto(next_step)

; --- Cas où aucune ligne n'est trouvée ---
same => n(no_guide),NoOp(Aucun GUIDE trouvé pour ${FORMAT_EXTEN}, routage de l'appel impossible)
same => n,Goto(fail)

; --- Suite du traitement normal ---
same => n(next_step),NoOp(Etape suivante du dialplan...)
same => n,Wait(1)
same => n,Playback(${GUIDE_FILE})
same => n(normal_call),ChanIsAvail(${TRUNKS_GROUP});Vérification des trunks disponibles
same => n,NoOp(AVAILCHAN=${AVAILCHAN} AVAILORIGCHAN=${AVAILORIGCHAN})
same => n,GotoIf($["${AVAILORIGCHAN}" != ""]?dial:fail)

same => n(dial),NoOp(Canal choisi = ${AVAILCHAN} / ${AVAILORIGCHAN})
same => n,Set(AVAIL_TRUNK=${AVAILORIGCHAN:6})
same => n,Dial(PJSIP/${FORMAT_EXTEN}@${AVAIL_TRUNK})

; Si c'est un problème de trunk (congestion / chan indispo), diffusion d'un message
same => n,GotoIf($["${DIALSTATUS}" == "CONGESTION" | "${DIALSTATUS}" == "CHANUNAVAIL"]?fail)

same => n(fail),NoOp(Aucun canal dispo)
same => n,Playback(vm-nobodyavail)
same => n,Playback(please-try-call-later)
same => n,Hangup(34)

[from-users]

include => exten-urgence ; appels d'urgence - bypass des droits d'appel
include => exten-SST ; appels SST - bypass des droits d'appel

exten => _0.,1,NoOp(Numéro commençant par 0)
same => n,Goto(from-users-next,${EXTEN},1)

exten => _+33XXXXXXXXX,1,NoOp(Numéro national commençant par +33)
same => n,Set(FORMAT_EXTEN=${EXTEN:3})
same => n,Set(FORMAT_EXTEN=0${FORMAT_EXTEN}); Conversion en 0XXXXXXXXX pour passer ensuite dans le context classique from-users-next
same => n,Goto(from-users-next,${FORMAT_EXTEN},1)

exten => _+XXXXXXXXXXXX,1,NoOp(Numéro DROM / international commençant par +)
same => n,Set(FORMAT_EXTEN=${EXTEN:1})
same => n,Set(FORMAT_EXTEN=00${FORMAT_EXTEN}); Conversion en 00XXXXXXXXXXXX pour passer ensuite dans le context classique from-users-next
same => n,Goto(from-users-next,${FORMAT_EXTEN},1)

[from-users-next]
exten => _0.,1,NoOp(Recherche des droits d'appels)
;same => n,Set(DROITS_USER=${ODBC_DROITS_APPEL(${CALLERID(num)})})
same => n,ExecIf($["${CALLERID(rdnis)}" != ""]?MSet(DROITS_USER=${ODBC_DROITS_APPEL(${CALLERID(rdnis)})},RENVOI=TRUE):Set(DROITS_USER=${ODBC_DROITS_APPEL(${CALLERID(num)})}))
same => n,ExecIf($["${RENVOI}" == "TRUE"]?NoOp(** Renvoi d'appel - Appelant : ${CALLERID(num)} - Appelé : ${CALLERID(rdnis)} - Renvoyé vers : ${EXTEN} **)
same => n,NoOp(Droits d'appel : ${DROITS_USER})
same => n,GotoIf($["${DROITS_USER}" = "" | "${RENVOI}" == "TRUE"]?RESTRICTION_NoOutGoing,${EXTEN},1);Si aucun droit n'a été trouvé, ou qu'il s'agit d'un renvoi d'appel, on applique une restriction à RESTRICTION_NoOutGoing
same => n,Gosub(choixOperateur,n,1);Si un droit a été trouvé, on récupère l'opérateur en sollicitant le sous-contexte
same => n,Goto(${DROITS_USER},${EXTEN},1);Sollicitation du contexte correspondant au droit correspondant


[vers-trunk]

; Afficher le numéro formaté
exten => _+.,1,NoOp(Appel sortant formaté vers ${CALLED_NUM})
same => n,Set(ADD_IP=10.189.138.226)

; Section d'appel

same => n(dial),Dial(PJSIP/${CALLED_NUM}@${TRUNKVAR}${DIV_HEADER}) ; Appel externe avec le trunk approprié

; Sauvegarde des infos de fin d'appel
same => n,Set(LAST_DIALSTATUS=${DIALSTATUS})
same => n,Set(LAST_HANGUPCAUSE=${HANGUPCAUSE})

same => n,NoOp(Fin appel trunk ${TRUNKVAR} : DIALSTATUS=${LAST_DIALSTATUS}, HANGUPCAUSE=${LAST_HANGUPCAUSE})
same => n,GotoIf($["${LAST_DIALSTATUS}" == "CHANUNAVAIL" & "${LAST_HANGUPCAUSE}" != "1" & "${LAST_HANGUPCAUSE}" != "27" & "${LAST_HANGUPCAUSE}" != "28"]?failover)

; Si c'est un problème de trunk (congestion / chan indispo), on tente le failover
same => n,GotoIf($["${LAST_DIALSTATUS}" == "CONGESTION" | "${LAST_DIALSTATUS}" == "UNAVAIL"]?failover)

; Sinon pas de failover, on traite selon la cause
same => n,Goto(retour-appel,s,1)

; Ouverture du cas de secours si le trunk est indisponible
same => n(failover),NoOp(Trunk ${TRUNKVAR} indisponible)

same => n,ExecIf($["${TRUNKVAR}" =~ "VEGA"]?Set(TRUNKVAR=${STRREPLACE(TRUNKVAR,VEGA,SIRIUS)}):Set(TRUNKVAR=${STRREPLACE(TRUNKVAR,SIRIUS,VEGA)}))

; Retenter d'appeler avec le nouveau trunk
same => n,NoOp(Nouvelle tentative d'appel avec ${TRUNKVAR})
same => n,Dial(PJSIP/${CALLED_NUM}@${TRUNKVAR}${DIV_HEADER})

; On enregistre les infos de cette deuxième tentative
same => n,Set(LAST_DIALSTATUS=${DIALSTATUS})
same => n,Set(LAST_HANGUPCAUSE=${HANGUPCAUSE})
same => n,NoOp(Fin appel failover trunk ${TRUNKVAR} : DIALSTATUS=${LAST_DIALSTATUS}, HANGUPCAUSE=${LAST_HANGUPCAUSE})

; On ne boucle plus : on retourne pour traitement final
same => n,Goto(retour-appel,s,1)

; Pattern en fonction des droits d'appel
[exten-internal0]

exten => _0[123459]XXXXXXXX,1,Noop(Conversion du numéro au format E164)
same => n,Set(FORMAT_EXTEN=${EXTEN:1})
same => n,Set(FORMAT_EXTEN=+33${FORMAT_EXTEN})
same => n,Goto(exten-internal,${FORMAT_EXTEN},1)

[exten-internal]
exten => _+33.,1,NoOp(Appel interne vers ${EXTEN})
same => n,Set(RECHERCHE_NUM=${ODBC_RECHERCHE_NUM(${EXTEN})})
; Vérifie si l'ID existe dans la base de données
same => n,GotoIf($["${RECHERCHE_NUM}" != ""]?interne:erreur)
; Si l'utilisateur existe, le faire sonner
same => n(interne),NoOp(L'utilisateur ${RECHERCHE_NUM} existe, sonner le poste)
same => n,Dial(${PJSIP_DIAL_CONTACTS(${EXTEN})})
same => n,Hangup()
; Si l'utilisateur n'existe pas, jouer un message d'erreur
same => n(erreur),NoOp(Aucun utilisateur trouvé en base avec le numéro ${EXTEN})
same => n,Playback(invalid)
same => n,Hangup()

[exten-nat]
