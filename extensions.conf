same => n,Set(FORMAT_EXTEN=${EXTEN:1})
same => n,Set(FORMAT_EXTEN=+33${FORMAT_EXTEN})
same => n,Set(RECHERCHE_NUM=${ODBC_RECHERCHE_NUM(${FORMAT_EXTEN})})
same => n,GotoIf($["${RECHERCHE_NUM}" != ""]?interne:sortieTrunk)
same => n(interne),NoOp(L'utilisateur ${FORMAT_EXTEN} existe, sonner le poste)
same => n,Dial(${PJSIP_DIAL_CONTACTS(${FORMAT_EXTEN})})
same => n,Hangup()

; Si l'utilisateur n'existe pas, sortie vers le trunk opérateur
same => n(sortieTrunk),NoOp(Aucun utilisateur trouvé en base avec le numéro ${FORMAT_EXTEN}, sortie vers le trunk ${TRUNKVAR})
