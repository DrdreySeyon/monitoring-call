[REPLACE_0]

exten => _0Z.,1,Set(CALLED_NUM=${EXTEN:1}) ; Enlever 0 du premier caractère
same => n,Set(CALLED_NUM=+33${CALLED_NUM}) ; Préfixer avec +33
same => n,Goto(vers-trunk,${CALLED_NUM},1); Redirection vers contexte pour choisir trunk de sortie

exten => _00Z.,1,Set(CALLED_NUM=${EXTEN:2}) ; Enlever 00 des deux premiers caractères
same => n,Set(CALLED_NUM=+${CALLED_NUM}) ; Préfixer avec +
same => n,Set(TRUNKVAR=TRUNK_SBC_OBSHDF_SIRIUS) ; Trunk de sortie = OBSHDF
same => n,Goto(vers-trunk,${CALLED_NUM},1); Redirection vers contexte pour choisir trunk de sortie

[PB_DROITS]
exten => i,1,NoOp(Droits d'appels insuffisants : ${DROITS_USER})
same => n,Playback(invalid)
same => n,Hangup()

[from-trunk]
#include extensions_predec.conf

exten => _+.,1,Set(TRUNKVAR=${CHANNEL(endpoint)})
same => n,NoOp(Appel entrant depuis le trunk ${TRUNKVAR} vers ${EXTEN})
same => n,Set(ORIG_CALLED_NUM=${EXTEN})
same => n,Set(CALLED_NUM=${EXTEN})
same => n,Set(TRADUIT_NUM=${ODBC_TRADUCTEUR_NUM(${CALLED_NUM})})
; Récupération du numéro traduit
same => n,GotoIf($["${TRADUIT_NUM}" != ""]?traducteur:defaut)
same => n(traducteur),NoOp(Le numéro ${CALLED_NUM} a été trouvé dans le traducteur et correspond à : ${TRADUIT_NUM})
same => n,Set(CALLED_NUM=${TRADUIT_NUM})
same => n,Set(DIV_HEADER=,,b(add1header^addheader^1(Diversion^<sip:${ORIG_CALLED_NUM}@${ADD_IP}>"\;reason=deflection"\;privacy=off"\;screen=yes))m(default)) ; ajout de l'instruction pour le context from-trunk et qui ajoutera le champs Diversion
same => n,Set(TRAD=TRUE)

same => n(defaut),NoOp(Recherche du numéro ${CALLED_NUM})
same => n,Set(RECHERCHE_NUM=${ODBC_RECHERCHE_NUM(${CALLED_NUM})})
; Vérifie si le numéro existe dans la base de données
; Si c'est le cas, faire sonner le poste associé (interne)
same => n,GotoIf($["${RECHERCHE_NUM}" != ""]?interne)
; Si ce n'est pas le cas :
; Redirection vers l'extérieur dans le cas d'un numéro traduit (redirect)
; Diffusion d'un message d'erreur dans les autres cas (erreur)
same => n,GotoIf($["${RECHERCHE_NUM}" = "" & "${TRAD}" = "TRUE"]?redirect:erreur)

; Si l'utilisateur existe, le faire sonner
same => n(interne),NoOp(L'utilisateur ${CALLED_NUM} existe, sonner le poste)
same => n,Dial(${PJSIP_DIAL_CONTACTS(${EXTEN})})
same => n,Hangup()

; Si le numéro n'existe pas mais qu'il s'agit d'une traduction de numéro, renvoyer l'appel vers l'extérieur
same => n(redirect),NoOp(Aucun utilisateur trouvé en base, renvoi vers l'extérieur)
same => n,Set(ADD_IP=10.189.138.226)
same => n,Set(ADDR_SRC=${CHANNEL(pjsip,remote_addr)})
same => n,Set(ADDR_SRC=${CUT(ADDR_SRC,:,1)})
same => n,Set(CALL_ID=${CHANNEL(pjsip,call-id)})
same => n,Set(REMOTE_TAG=${CHANNEL(pjsip,remote_tag)})
; Test envoi trame UDP vers MyInCall (fonctionne)
same => n,System(/bin/echo '<sip:${CALLERID(num)}@${ADD_IP}>"\;tag=${REMOTE_TAG}|<sip:${CALLED_NUM}@${ADDR_SRC}>|${CALL_ID}' > /dev/udp/myincall-udp-57922.mycloud.intrabpce.fr/57922) ; envoi d'une trame SIP vers MyInCall

same => n,Playback(call-forward)
same => n,Wait(1)
same => n,SayAlpha(+)
same => n,SayDigits(${CALLED_NUM})
same => n,Goto(vers-trunk,${CALLED_NUM},1)

; Si le numéro n'existe pas, diffusion d'un message d'erreur
same => n(erreur),NoOp(Le numéro ${CALLED_NUM} n'existe pas dans la base)
same => n,Playback(ss-noservice)
same => n,Hangup(1)

[retour-appel]

exten => s,1,NoOp(Traitement retour appel DIALSTATUS=${LAST_DIALSTATUS}, HANGUPCAUSE=${LAST_HANGUPCAUSE})

; Exemple de mapping :
; BUSY (ligne occupée)
same => n,GotoIf($["${LAST_DIALSTATUS}" == "BUSY"]?busy)

; Pas de réponse
same => n,GotoIf($["${LAST_DIALSTATUS}" == "NOANSWER"]?noanswer)

; Numéro non trouvé, mauvaise adresse, etc.
same => n,GotoIf($["${LAST_DIALSTATUS}" == "FAILED" | "${LAST_DIALSTATUS}" == "CANCEL"]?failed)
same => n,GotoIf($["${LAST_DIALSTATUS}" == "CHANUNAVAIL" & "${LAST_HANGUPCAUSE}" == "28"]?failed)
same => n,GotoIf($["${LAST_DIALSTATUS}" == "CHANUNAVAIL" & "${LAST_HANGUPCAUSE}" == "1"]?failed)

same => n,GotoIf($["${LAST_DIALSTATUS}" == "CHANUNAVAIL" & "${LAST_HANGUPCAUSE}" == "27"]?noanswer)

; Trunk / réseau indisponible (si on arrive ici, c'est que même le failover n'a pas marché)
same => n,GotoIf($["${LAST_DIALSTATUS}" == "CONGESTION" | "${LAST_DIALSTATUS}" == "CHANUNAVAIL" | "${LAST_DIALSTATUS}" == "UNAVAIL"]?indispo)

; DEFAULT : message générique
same => n,Goto(defaut)

; --- Cas occupé ---
same => n(busy),NoOp(Appel occupé)
same => n,Playback(vm-theperson)
same => n,Playback(is-curntly-busy)
same => n,Hangup(17)               ; 17 = Busy

; --- Cas pas de réponse ---
same => n(noanswer),NoOp(Aucune réponse)
same => n,Playback(that-number)
same => n,Playback(no-longer-in-service)
same => n,Wait(1)
same => n,Hangup(19)               ; 19 = No answer

; --- Cas numéro non trouvé / erreur d'adresse ---
same => n(failed),NoOp(Appel échoué, numéro non trouvé ou autre)

; ex: 1 (unassigned number), 3 (no route to destination), etc.
same => n,Playback(ss-noservice)
same => n,Hangup(1)

; --- Cas réseau / trunk indisponible après failover ---
same => n(indispo),NoOp(Trunk(s) indisponible(s) même après failover)
same => n,Playback(all-circuits-busy-now)
same => n,Playback(please-try-call-later)
same => n,Hangup(34)               ; 34 = no circuit available

; --- Cas par défaut ---
same => n(defaut),NoOp(Cas non géré explicitement, message générique)
same => n,Playback(invalid)
same => n,Hangup()

[collect-rtp-stats]
exten => s,1,NoOp(=== Récupération VRAIES valeurs RTP ===)
same => n,set(HOSTNAME=${SHELL(hostname |  tr -d \\n)})
same => n,Set(machine=${HOSTNAME})
same => n,Set(channel_cdr=${CHANNEL})
same => n,set(RTCP_ALL=${CHANNEL(rtcp,all)})

; Parser chaque valeur individuellement avec SHELL pour éviter les problèmes de ;
same => n,Set(RTP_SSRC=${SHELL(echo '${RTCP_ALL}' | grep -o 'ssrc=[0-9]*' | cut -d= -f2 | head -c 10 | tr -d \\n)})
same => n,Set(RTP_THEMSSRC=${SHELL(echo "${RTCP_ALL}" | grep -o "themssrc=[0-9]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_LP=${SHELL(echo "${RTCP_ALL}" | grep -o "lp=[0-9]*" | cut -d= -f2 | tr -d \\n)})

;
same => n,Set(RTP_LP=${IF($["${RTP_LP}" = "00"]?0:${RTP_LP})})
;

same => n,Set(RTP_RXJITTER=${SHELL(echo "${RTCP_ALL}" | grep -o "rxjitter=[0-9.]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_RXCOUNT=${SHELL(echo "${RTCP_ALL}" | grep -o "rxcount=[0-9]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_TXJITTER=${SHELL(echo "${RTCP_ALL}" | grep -o "txjitter=[0-9.]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_TXCOUNT=${SHELL(echo "${RTCP_ALL}" | grep -o "txcount=[0-9]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_RLP=${SHELL(echo "${RTCP_ALL}" | grep -o "rlp=[0-9]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_RTT=${SHELL(echo "${RTCP_ALL}" | grep -o "rtt=[0-9.]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_RXMES=${SHELL(echo "${RTCP_ALL}" | grep -o "rxmes=[0-9.]*" | cut -d= -f2 | tr -d \\n)})
same => n,Set(RTP_TXMES=${SHELL(echo "${RTCP_ALL}" | grep -o "txmes=[0-9.]*" | cut -d= -f2 | tr -d \\n)})

; Debug des valeurs récupérées
same => n,NoOp(=== VRAIES VALEURS RÉCUPÉRÉES ===)
same => n,NoOp(SSRC=[${RTP_SSRC}] THEMSSRC=[${RTP_THEMSSRC}])
same => n,NoOp(RXJITTER=[${RTP_RXJITTER}] RXCOUNT=[${RTP_RXCOUNT}])
same => n,NoOp(TXJITTER=[${RTP_TXJITTER}] TXCOUNT=[${RTP_TXCOUNT}])
same => n,NoOp(MACHINE=[${machine}] RXPLOSS=[${rxploss_cdr}] SSRC=[${RTP_SSRC}])

; Construction du CDR avec les VRAIES valeurs dynamiques
same => n,Set(CDR(userfield)=machine\;${machine}\;ssrc\;${RTP_SSRC}\;themssrc\;${RTP_THEMSSRC}\;lp\;${RTP_LP}\;rxjitter\;${RTP_RXJITTER}\;rxcount\;${RTP_RXCOUNT}\;txjitter\;${RTP_TXJITTER}\;txcount\;${RTP_TXCOUNT}\;rlp\;${RTP_RLP}\;rtt\;${RTP_RTT}\;rxmes\;${RTP_RXMES}\;txmes\;${RTP_TXMES}\;EOL)

same => n,Set(CDR(machine)=${machine})
same => n,Set(CDR(ssrc)=${RTP_SSRC})
same => n,Set(CDR(themssrc)=${RTP_THEMSSRC})
same => n,Set(CDR(lp)=${RTP_LP})
same => n,Set(CDR(rxjitter)=${RTP_RXJITTER})
same => n,Set(CDR(rxcount)=${RTP_RXCOUNT})
same => n,Set(CDR(txjitter)=${RTP_TXJITTER})
same => n,Set(CDR(txcount)=${RTP_TXCOUNT})
same => n,Set(CDR(rlp)=${RTP_RLP})
same => n,Set(CDR(rtt)=${RTP_RTT})
same => n,Set(CDR(rxmes)=${RTP_RXMES})
same => n,Set(CDR(txmes)=${RTP_TXMES})

same => n,NoOp(=== CDR userfield final: ${CDR(userfield)} ===)
same => n,DumpChan()
same => n,Return()

[recording]
exten => _+X.,1,NoOp(Appel sortant vers ${EXTEN} depuis ${CALLERID(num)} - Context RECORDING)

; On construit un timestamp simple pour nommer le fichier
same => n,Set(CURRTS=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)})

; Fichier principal pour MixMonitor
same => n,Set(RECORDING_FILE=${EXTEN}_${CURRTS}.wav)
same => n,Set(RECORDING_PATH=/srv/asterisk/var/spool/asterisk/recordings/${RECORDING_FILE})

same => n,Answer()

; Timestamp de début de la durée utile
same => n,Set(START_TS=${EPOCH})

; Enregistrement de 3 fichiers, canal appelant, appelé et combiné
;same => n,MixMonitor(${RECORDING_PATH},r(/srv/asterisk/var/spool/asterisk/recordings/${EXTEN}_${CURRTS}_rx.wav)t(/srv/asterisk/var/spool/asterisk/recordings/${EXTEN}_${CURRTS}_tx.wav))
same => n,MixMonitor(${RECORDING_PATH})


same => n,ExecIf($["${dtmf}" != "" & "${time_ms_between_dtmf}" != "" & "${time_s_before_dtmf}" != ""]?Set(SEND_DTMF=TRUE):MSet(SEND_DTMF=FALSE,time_s_before_dtmf=0))
same => n,GotoIf($["${SEND_DTMF}" = "FALSE"]?normal)
; Si dtmf à envoyer, on calcule la durée des intervalles entre DTMF (sans prendre en compte le dernier)
same => n,ExecIf($["${SEND_DTMF}" == "TRUE"]?Set(DTMF_COUNT=${LEN(${dtmf})}))
same => n,ExecIf($["${SEND_DTMF}" == "TRUE"]?Set(DTMF_INTERVAL_COUNT=$[${DTMF_COUNT} - 1]))
same => n,ExecIf($["${SEND_DTMF}" == "TRUE"]?Set(TOTAL_INTERVAL_MS=$[${DTMF_INTERVAL_COUNT} * ${time_ms_between_dtmf}]))
same => n,ExecIf($["${SEND_DTMF}" == "TRUE"]?Set(TOTAL_INTERVAL_S=$[${TOTAL_INTERVAL_MS} / 1000.0]))

same => n,ExecIf($["${SEND_DTMF}" == "TRUE"]?Set(SECOND_WAIT=$[${call_time_s} - ${time_s_before_dtmf} - ${TOTAL_INTERVAL_S}]):Set(SECOND_WAIT=0))

same => n,Goto(dtmf)

same => n(normal),NoOp(Appel classique d'une durée de ${call_time_s} secondes)
same => n,Wait(${call_time_s})
same => n,NoOp(=== TEST APRES WAIT NORMAL - rxjitter: [${rxjitter}] rxcount: [${rxcount}] txjitter: [${txjitter}] ===)
same => n,DumpChan()

same => n,Gosub(collect-rtp-stats,s,1)
same => n,Hangup()

same => n(dtmf),NoOp(Appel d'une durée de ${call_time_s} secondes avec envoi des DTMF ${dtmf} et ${time_ms_between_dtmf} ms d'intervalle entre chaque et ${SECOND_WAIT} secondes après l'envoi du dernier DTMF)
same => n,Wait(${time_s_before_dtmf})

; on initialise l'index à 0
same => n,Set(DTMF_INDEX=0)

; dtmf = chaîne complète, time_ms_between_dtmf = intervalle en ms
same => n,Gosub(send-dtmf-loop,s,1(${dtmf},${time_ms_between_dtmf},${DTMF_INDEX}))

same => n,Wait(${SECOND_WAIT})
same => n,NoOp(=== TEST APRES WAIT NORMAL - rxjitter: [${rxjitter}] rxcount: [${rxcount}] txjitter: [${txjitter}] ===)
same => n,DumpChan()

same => n,Gosub(collect-rtp-stats,s,1)
same => n,Hangup()

; Post traitement après un raccroché
exten => h,1,NoOp(POST TRAITEMENT - Transcription + alimentation BDD)
; Fin de l'appel DTMF -> on arrête l'enregistrement
same => n,StopMixMonitor()
same => n,NoOp(HANGUPCAUSE=${HANGUPCAUSE})

; Timestamp de fin de la durée utile
same => n,Set(END_TS=${EPOCH})

; Durée logique en secondes (fin - début)
same => n,Set(CALL_DURATION_LOGICAL=$[${END_TS} - ${START_TS}])

; Mot-clé à détecter
same => n,Set(KEYWORD=${keyword})

; Execution de Vosk pour faire la transcription du fichier audio et insérer dans la base interne Asterisk le statut (OK / KO) et la transcription
same => n,System(/usr/bin/python3 /srv/asterisk/scripts/vosk_transcribe.py "${RECORDING_PATH}" "${KEYWORD}" "${UNIQUEID}")


; On lit les résultats depuis l'AstDB
same => n,Set(KEYWORD_STATUS=${DB(VOSK/${UNIQUEID}/STATUS)})
same => n,Set(FULL_TRANSCRIPTION=${DB(VOSK/${UNIQUEID}/TRANSCRIPTION)})

same => n,NoOp(Vosk status : ${KEYWORD_STATUS})
same => n,NoOp(Vosk transcription : ${FULL_TRANSCRIPTION})

; Envoi du statut Vosk et de la transcription dans la base MySQL Asterisk
same => n,Set(ODBC_VOSK_INSERT(${KEYWORD_STATUS},${FULL_TRANSCRIPTION},${UNIQUEID},${HANGUPCAUSE})=1)

; Suppression des valeurs de la base intere Asterisk
same => n,Set(DROP1=${IF($["${KEYWORD_STATUS}" != ""]?${DB_DELETE(VOSK/${UNIQUEID}/STATUS)}:)})
same => n,Set(DROP2=${IF($["${FULL_TRANSCRIPTION}" != ""]?${DB_DELETE(VOSK/${UNIQUEID}/TRANSCRIPTION)}:)})

; Suppression des fichiers audios sur le serveur
same => n,System(rm -f ${RECORDING_PATH})

[send-dtmf-loop]

exten => s,1,NoOp(Sous-contexte envoi DTMF - Chaine='${ARG1}' Intervalle=${ARG2}ms Index=${ARG3})

; Initialisation des variables locales
same => n,Set(DTMF_STRING=${ARG1})
same => n,Set(DTMF_INTERVAL_MS=${ARG2})
same => n,Set(DTMF_INDEX=${ARG3})

; Longueur de la chaîne
same => n,Set(DTMF_LEN=${LEN(${DTMF_STRING})})

; Si index >= longueur => on a fini, on revient
same => n,GotoIf($[${DTMF_INDEX} >= ${DTMF_LEN}]?done)

; Extraire le caractère courant (index 0-based)
; SUBSTR(s,offset,length) : ici length=1 pour un seul caractère
same => n,Set(CUR_DTMF=${DTMF_STRING:${DTMF_INDEX}:1})

same => n,NoOp(Envoi DTMF '${CUR_DTMF}' (index ${DTMF_INDEX}/${DTMF_LEN}))

; On envoie le DTMF actuel, sans intervalle ajouté par Asterisk
; (durée 300 ms, pas de pause dans SendDTMF)
same => n,SendDTMF(${CUR_DTMF},,300)

; On calcule l'index suivant
same => n,Set(NEXT_INDEX=$[${DTMF_INDEX} + 1])

; Si ce n'était pas le dernier caractère, on attend l'intervalle puis on boucle
same => n,GotoIf($[${NEXT_INDEX} < ${DTMF_LEN}]?wait-and-loop:done)

same => n(wait-and-loop),NoOp(Attente de ${DTMF_INTERVAL_MS} ms avant le prochain DTMF)
; Wait accepte les secondes, donc on convertit ms → s
same => n,Set(DTMF_INTERVAL_S=$[${DTMF_INTERVAL_MS}/1000.0])
same => n,Wait(${DTMF_INTERVAL_S})
same => n,Gosub(s,1(${DTMF_STRING},${DTMF_INTERVAL_MS},${NEXT_INDEX}))

same => n(done),NoOp(Fin de la boucle DTMF)
same => n,Return()
